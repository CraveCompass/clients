name: Client PR Verification

on:
    pull_request:
        branches: [main]

jobs:
    frontend-validation:
        name: Next.js Client Checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 8

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install Frontend Dependencies
              run: pnpm install

            - name: Run Next.js Linter
              run: pnpm lint

            - name: Verify Production Build
              run: pnpm build
              env:
                  NEXT_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_PLACES_API_KEY }}
