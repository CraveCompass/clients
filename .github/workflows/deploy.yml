name: Deploy Next.js Frontend

on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ghcr.io/cravecompass/cravecompass-web:latest
                  build-args: |
                      NEXT_PUBLIC_API_URL=${{ vars.PROD_API_URL }}
                      NEXT_PUBLIC_WS_URL=${{ vars.PROD_WS_URL }}

            - name: Trigger Dokploy Deployment
              run: curl -s -X GET "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
